version: 1
name: note-enhancement
description: Fabric-native note enhancement pipeline for polishing and clarifying draft notes.
accepts:
  - stdin
  - source
  - scrape_url
stages:
  - id: prepare_source
    executor: command
    input:
      from: source
    command:
      program: python3
      args:
        - scripts/pipelines/note-enhancement/prepare_source.py
      cwd: ../..
    artifacts:
      - name: session_context
        path: session_context.json
      - name: enhancement_input
        path: enhancement_input.md
    primary_output:
      from: stdout

  - id: enhance_generate
    executor: fabric_pattern
    input:
      from: artifact
      stage: prepare_source
      artifact: enhancement_input
    pattern: ../patterns/note_enhancement_rewrite/system.md
    stream: true

  - id: enhance_materialize
    executor: command
    command:
      program: python3
      args:
        - scripts/pipelines/note-enhancement/materialize_enhanced_notes.py
        - --session-context
        - "{{artifact:prepare_source:session_context}}"
      cwd: ../..
    final_output: true
    artifacts:
      - name: enhanced_notes
        path: enhanced_notes.md
      - name: edit_log
        path: edit_log.md
    primary_output:
      from: stdout

  - id: validate_outputs
    role: validate
    executor: command
    command:
      program: python3
      args:
        - scripts/pipelines/note-enhancement/run_validate_stage.py
        - --session-context
        - "{{artifact:prepare_source:session_context}}"
      cwd: ../..
    artifacts:
      - name: validation_report
        path: validation_report.md

  - id: write_publish_manifest
    role: publish
    executor: builtin
    builtin:
      name: write_publish_manifest
    artifacts:
      - name: publish_manifest
        path: publish_manifest.json
