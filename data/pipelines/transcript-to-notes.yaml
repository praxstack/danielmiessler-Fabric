version: 1
name: transcript-to-notes
description: Convert any transcript into structured, readable notes.
accepts:
  - stdin
  - source
  - scrape_url
stages:
  - id: generate_notes
    executor: fabric_pattern
    pattern: ../patterns/transcript_to_notes/system.md
    stream: true
    final_output: true
    primary_output:
      from: stdout
  - id: validate_output
    role: validate
    executor: builtin
    builtin:
      name: validate_declared_outputs
